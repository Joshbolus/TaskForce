<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TickBox</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Title and Logo-->
    <div class="title-container">
        <img src="favicon.png" alt="tickbox logo" class="title-icon">
        <h1>TickBox</h1>
    </div>
    <p>Personal To-Do Checklist</p>

    <!-- Add Task Button -->
    <div id="StartButton">
        <button onclick="showForm()">Start a List</button>
    </div>
    
    <div id="taskForm">
        <br>

        <input type="text" id="taskInput" placeholder="Enter your task">

        <br><br>

        <label>Priority:</label>
        <select id="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <br><br>

        <button onclick="addTask()">+ Add Task</button>
    </div>

    <h3>Task List</h3>
    <ul id="taskList"></ul>

    <script>
        function showForm() {
            document.getElementById("taskForm").style.display = "block";
            document.getElementById("StartButton").style.display = "none";
        }

        function addTask() {
            var taskText = document.getElementById("taskInput").value;
            var priority = document.getElementById("priority").value;

            if (taskText === "") {
                alert("Please enter a task.");
                return;
            }

            var li = document.createElement("li");
            li.textContent = taskText + " - " + priority + " Priority";

            document.getElementById("taskList").appendChild(li);

            document.getElementById("taskInput").value = "";
        }
    </script>

</body>
</html>
