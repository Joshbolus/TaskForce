<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TickBox</title>

    <style>
        #taskForm {
            display: none; /* Hidden at start */
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>TickBox</h1>
    <p>Personal To-Do Checklist</p>

    <!-- Add Task Button -->
    <button onclick="showForm()">+ Add a task</button>

    
    <div id="taskForm">
        <br>

        <input type="text" id="taskInput" placeholder="Enter your task">

        <br><br>

        <label>Priority:</label>
        <select id="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <br><br>

        <button onclick="addTask()">Add Task</button>
    </div>

    <h3>Task List</h3>
    <ul id="taskList"></ul>

    <script>
        function showForm() {
            document.getElementById("taskForm").style.display = "block";
        }

        function addTask() {
            var taskText = document.getElementById("taskInput").value;
            var priority = document.getElementById("priority").value;

            if (taskText === "") {
                alert("Please enter a task.");
                return;
            }

            var li = document.createElement("li");
            li.textContent = taskText + " - " + priority + " Priority";

            document.getElementById("taskList").appendChild(li);

            document.getElementById("taskInput").value = "";
        }
    </script>

</body>
</html>
